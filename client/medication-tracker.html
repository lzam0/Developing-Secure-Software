    <body>
        <ul>
           <nav>

    <h1 class="title">Medication/Supplement Tracker</h1>

    <button class="btn" onclick="addEntry()">Add Entry</button>
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Medication/Supplement</h2>
            <form id="entryForm" class="form-group">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>
                <label for="medication">Medication/Supplement:</label>
                <input type="text" id="medication" name="medication" required>
                <label for="dosage">Dosage:</label>
                <input type="text" id="dosage" name="dosage" required>
                <label for="frequency">Frequency:</label>
                <input type="text" id="frequency" name="frequency">
                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes"></textarea>
                <button type="submit" class="btn">Add Entry</button>
            </form>
        </div>

   
    

        </ul>

         <div> 

        <table id="trackerTable">
            <tr class="t-header">
                <th>Date</th>
                <th>Medication/Supplement</th>
                <th>Dosage</th>
                <th>Frequency</th>
                <th>Notes</th>
            </tr>
        </table>
        
    </div>

        <main>
           <script>
                const modal = document.getElementById("myModal");
                const span = document.getElementsByClassName("close")[0];

                function addEntry() {
                    modal.style.display = "flex";
                }

                span.onclick = function() {
                    modal.style.display = "none";
                }

                window.onclick = function(event) {
                    if (event.target == modal) {
                        modal.style.display = "none";
                    }
                }

                const entryForm = document.getElementById("entryForm");
                const trackerTable = document.getElementById("trackerTable");

                entryForm.onsubmit = function(e)
                {
                    e.preventDefault();

                    const date = document.getElementById("date").value;
                    const medication = document.getElementById("medication").value;
                    const dosage = document.getElementById("dosage").value;
                    const frequency = document.getElementById("frequency").value;
                    const notes = document.getElementById("notes").value;

                    const row = trackerTable.insertRow(-1);
                    row.insertCell(0).textContent = date;
                    row.insertCell(1).textContent = medication;
                    row.insertCell(2).textContent = dosage;
                    row.insertCell(3).textContent = frequency;
                    row.insertCell(4).textContent = notes;

                    entryForm.reset();
                    modal.style.display = "none";
                };

            </script>
    </body> 
</html>
