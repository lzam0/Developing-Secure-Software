    <body>
        <ul>
           <nav>

    <h1 class="title">Health Metrics  Tracker</h1>

    <button class="btn" onclick="addEntry()">Add Entry</button>
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Health Metric</h2>
            <form id="entryForm" class="form-group">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>
                <label for="metric">Health Metric:</label>
                <input type="text" id="metric" name="metric" required>
                <label for="current">Current Value:</label>
                <input type="text" id="current" name="current" required>
                <label for="goal">Goal Value:</label>
                <input type="text" id="goal" name="goal">
                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes"></textarea>
                <button type="submit" class="btn">Add Entry</button>
            </form>
        </div>

    
    

        </ul>
        <div> 

        <table id="trackerTable">
            <tr class="t-header">
                <th>Date</th>
                <th>Health Metric</th>
                <th>Current</th>
                <th>Goal</th>
                <th>Notes</th>
            </tr>
        </table>
        
    </div>
        

        <main>
           

            <script>
                const modal = document.getElementById("myModal");
                const span = document.getElementsByClassName("close")[0];

                function addEntry() {
                    modal.style.display = "flex";
                }

                span.onclick = function() {
                    modal.style.display = "none";
                }

                window.onclick = function(event) {
                    if (event.target == modal) {
                        modal.style.display = "none";
                    }
                }

                const entryForm = document.getElementById("entryForm");
                const trackerTable = document.getElementById("trackerTable");

                entryForm.onsubmit = function(e)
                {
                    e.preventDefault();

                    const date = document.getElementById("date").value;
                    const metric = document.getElementById("metric").value;
                    const current = document.getElementById("current").value
                    const goal = document.getElementById("goal").value;
                    const notes = document.getElementById("notes").value;

                    const row = trackerTable.insertRow(-1);
                    row.insertCell(0).textContent = date;
                    row.insertCell(1).textContent = metric;
                    row.insertCell(2).textContent = current;
                    row.insertCell(3).textContent = goal;
                    row.insertCell(4).textContent = notes;

                    entryForm.reset();
                    modal.style.display = "none";
                };

            </script>
    </body>
